name: Build
run-name: Build
on:
  push:
    branches:
      - '*'
env:
  BUILD_TYPE: Release
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    # - name: Install Qt
    #   uses: jurplel/install-qt-action@v3
    #   with:
    #     aqtversion: '==3.1.*'
    #     version: '6.8.0'
    #     host: 'linux'
    #     target: 'desktop'
    #     arch: 'linux_gcc_64'
    #     modules: 'qthttpserver qtimageformats qtnetworkauth qtwebsockets'
    #     tools: 'tools_ifw tools_opensslv3_src'
    #     add-tools-to-path: true
    #     source: true

    - name: Build QT
      run: |
        sudo apt-get install cmake \
          python3 \
          llvm-dev \
          build-essential \
          libgl1-mesa-dev \
          libfontconfig1-dev \
          libfreetype-dev \
          libx11-dev \
          libx11-xcb-dev \
          libxcb-cursor-dev \
          libxcb-glx0-dev \
          libxcb-icccm4-dev \
          libxcb-image0-dev \
          libxcb-keysyms1-dev \
          libxcb-randr0-dev \
          libxcb-render-util0-dev \
          libxcb-shape0-dev \
          libxcb-shm0-dev \
          libxcb-sync-dev \
          libxcb-util-dev \
          libxcb-xfixes0-dev \
          libxcb-xinerama0-dev \
          libxcb-xkb-dev \
          libxcb1-dev \
          libxext-dev \
          libxfixes-dev \
          libxi-dev \
          libxkbcommon-dev \
          libxkbcommon-x11-dev \
          libxrender-dev \
          llvm-dev
        cd ..
        git clone --branch v6.8.0 https://code.qt.io/qt/qt5.git
        mkdir qt-build
        cd qt-build
        ../qt5/configure -static -init-submodules -submodules qthttpserver,qtimageformats,qtnetworkauth,qtwebsockets -nomake tools -nomake tests -nomake examples -no-dbus
        cmake --build . --parallel 2
        sudo cmake --install .

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      # Build your program with the given configuration
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Install
      run: |
        cmake --install ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --prefix="$(pwd)/bin"
        tar -cvf bin.tar bin
        ldd ./bin/bin/tootrain-qt

    - uses: actions/upload-artifact@v4
      with:
        name: linux
        path: |
          ${{github.workspace}}/build
          ${{github.workspace}}/bin.tar
        retention-days: 7
